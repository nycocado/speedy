---
- name: 01 - Shell e Dotfiles (Distrobox)
  block:
    - name: Instalar Zsh e dependências dentro do container
      ansible.builtin.command:
        cmd: 'distrobox enter -n speedy-dev -- sh -c "sudo apt-get update && sudo apt-get install -y zsh git curl wget"'
      changed_when: false

    - name: Instalar Oh My Zsh dentro do container
      ansible.builtin.command:
        cmd: 'env -u ZSH distrobox enter -n speedy-dev -- sh -c "[ -d ~/.oh-my-zsh ] || (curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh > /tmp/install_omz.sh && sh /tmp/install_omz.sh --unattended)"'
      changed_when: false

    - name: Clonar plugins Zsh dentro do container
      ansible.builtin.command:
        cmd: 'distrobox enter -n speedy-dev -- sh -c "[ -d ~/.oh-my-zsh/custom/{{ item.path }} ] || git clone --depth=1 {{ item.repo }} ~/.oh-my-zsh/custom/{{ item.path }}"'
      loop:
        - { repo: 'https://github.com/romkatv/powerlevel10k.git', path: 'themes/powerlevel10k' }
        - { repo: 'https://github.com/zsh-users/zsh-autosuggestions', path: 'plugins/zsh-autosuggestions' }
        - { repo: 'https://github.com/zsh-users/zsh-syntax-highlighting.git', path: 'plugins/zsh-syntax-highlighting' }
        - { repo: 'https://github.com/zsh-users/zsh-completions.git', path: 'plugins/zsh-completions' }
      changed_when: false

    - name: Configurar Zsh como shell padrão do container
      ansible.builtin.command:
        cmd: 'distrobox enter -n speedy-dev -- sudo chsh -s /usr/bin/zsh {{ ansible_user_id }}'
      changed_when: false

    - name: Sincronizar dotfiles para a Home isolada
      ansible.builtin.copy:
        src: "../files/{{ item }}"
        dest: "{{ ansible_user_dir }}/distrobox/speedy-home/{{ item }}"
        mode: '0644'
      loop: [.zshrc, .p10k.zsh]
